<!DOCTYPE html>
<html>

<head>
    <title>Login</title>

</head>

<body>
    <div class="container">
        <h2>Login</h2>
        <form action="connect.php" method="POST">
            <div>
                <label for="username">Name:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit">Login</button>
        </form>

    </div>

    <style>
        body {
            background-color: #eee;
            ;
        }

        /* form */
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            width: 30%;
            margin-top: 30px;
            margin-top: 30px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            /*to make center*/

        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 2px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],

        form select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 3px;
            box-sizing: border-box;
        }

        button {
            background-color: #4CAF50;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }

        .reg {
            align-items: center;
            display: flex;
            margin-bottom: 10px;
        }

        .reg .fa-solid {
            font-size: 50px;
            margin: 30px;
            color: #4CAF50;

        }
    </style>
</body>

</html>
